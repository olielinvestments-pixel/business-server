<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דשבורד עסקי</title>
<style>
body { font-family: Arial, sans-serif; background:#f4f5f7; margin:0; padding:20px; }
h1 { text-align:center; color:#333; }
.grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; max-width:700px; margin:20px auto; }
.card { background:white; border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.1); text-align:center; }
.card .num { font-size:36px; font-weight:bold; color:#2563eb; }
.card .label { color:#666; margin-top:8px; font-size:14px; }
.card.money .num { color:#16a34a; }
.status { text-align:center; color:#999; margin-top:30px; font-size:13px; }
.err { color:#dc2626; }
.refresh-btn { display:block; margin:16px auto 0; padding:8px 24px; background:#2563eb; color:white; border:none; border-radius:8px; font-size:14px; cursor:pointer; }
</style>
</head>
<body>
<h1>דשבורד עסקי</h1>
<div class="grid">
  <div class="card"><div class="num" id="ordersCount">-</div><div class="label">הזמנות פתוחות (לא סופקו)</div></div>
  <div class="card money"><div class="num" id="ordersSum">-</div><div class="label">סכום הזמנות פתוחות (&#8362;)</div></div>
  <div class="card"><div class="num" id="serviceCount">-</div><div class="label">קריאות שירות פתוחות</div></div>
  <div class="card money"><div class="num" id="serviceSum">-</div><div class="label">סכום קריאות שירות פתוחות (&#8362;)</div></div>
</div>
<div class="status" id="status">טוען נתונים...</div>
<button class="refresh-btn" onclick="load()">רענן</button>
<script>
async function load() {
  document.getElementById('status').textContent = 'טוען נתונים...';
  try {
    const r = await fetch('/api/dashboard-data');
    if (!r.ok) throw new Error('שגיאת שרת: ' + r.status);
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    document.getElementById('ordersCount').textContent = d.openOrders;
    document.getElementById('ordersSum').textContent = Number(d.sumOpen).toLocaleString();
    document.getElementById('serviceCount').textContent = d.openService;
    document.getElementById('serviceSum').textContent = Number(d.serviceSum).toLocaleString();
    document.getElementById('status').textContent = 'עודכן: ' + d.updatedAt;
  } catch(e) {
    document.getElementById('status').innerHTML = '<span class="err">שגיאה: ' + e.message + '</span>';
  }
}
load();
</script>
</body>
</html>
